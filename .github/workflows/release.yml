name: 自动打包APK

on:
  workflow_dispatch:
  push:
    branches: [ master ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: temurin

      - name: Grant execute permission
        run: chmod +x gradlew

      - name: 构建打包APK
        run: ./gradlew assembleAppRelease

      - name: 上传打包好的文件
        uses: actions/upload-artifact@v4
        with:
          name: legado-apk
          path: app/build/outputs/apk/app/release/*.apk